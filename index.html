<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>Síntesi 2SMX 2026</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Projectes de síntesi de segon curs d'SMX 2026</h1>
    <p>Sistemes Microinformàtics i Xarxes</p>
  </header>

  <div class="container">
    <div class="grid">

      <div class="card tipus3">
        <div class="card_header">
          <h3>Classe G3 - grup 1</h3>
          <a href="#" class="mes_info_btn">+</a>
        </div>
        <p>Escenari de servidors d'una empresa de videojocs.</p>
        <div class="footer-card">
          <div class="icons">
            <i id="G3g1-HW" class="fa-solid fa-computer" title="Hardware"></i>
            <i id="G3g1-NET" class="fa-solid fa-network-wired" title="Xarxa"></i>
            <i id="G3g1-AD" class="fa-solid fa-users-gear" title="AD"></i>
            <i id="G3g1-DNS" class="fa-solid fa-globe" title="DNS"></i>
            <i id="G3g1-A2" class="fa-solid fa-code" title="Apache"></i>
            <i id="G3g1-BK" class="fa-solid fa-database" title="Backup"></i>
          </div>
        </div>
      </div>

      <div class="card tipus3">
        <div class="card_header">
          <h3>Classe G3 - grup 2</h3>
          <a href="#" class="mes_info_btn">+</a>
        </div>
        <p>Escenari agroalimentari.</p>
        <div class="footer-card">
          <div class="icons">
            <i id="G3g2-HW" class="fa-solid fa-computer" title="Hardware"></i>
            <i id="G3g2-NET" class="fa-solid fa-network-wired" title="Xarxa"></i>
            <i id="G3g2-AD" class="fa-solid fa-users-gear" title="AD"></i>
            <i id="G3g2-DNS" class="fa-solid fa-globe" title="DNS"></i>
          </div>
        </div>
      </div>

      <div class="card tipus3">
        <div class="card_header">
          <h3>Classe G3 - grup 5</h3>
          <a href="#" class="mes_info_btn">+</a>
        </div>
        <p>Escenari de cibercafès.</p>
        <div class="footer-card">
          <div class="icons">
            <i id="G3g5-HW" class="fa-solid fa-computer" title="Hardware"></i>
            <i id="G3g5-NET" class="fa-solid fa-network-wired" title="Xarxa"></i>
            <i id="G3g5-AD" class="fa-solid fa-users-gear" title="AD"></i>
            <i id="G3g5-DNS" class="fa-solid fa-globe" title="DNS"></i>
            <i id="G3g5-A2" class="fa-solid fa-code" title="Apache"></i>
            <i id="G3g5-BK" class="fa-solid fa-database" title="Backup"></i>
            <i id="G3g5-VPN" class="fa-solid fa-lock" title="VPN"></i>
          </div>
        </div>
      </div>

    </div>
  </div>

  <footer>
    <p>SMX - Thos i Codina</p>
  </footer>

  <script>
    async function carregarEstat() {
      try {
        // Busquem el fitxer estat.json que generarà n8n
        const response = await fetch('estat.json');
        if (!response.ok) return;
        const dades = await response.json();

        for (const grup in dades) {
          const tasques = dades[grup];
          tasques.forEach(servei => {
            const el = document.getElementById(`${grup}-${servei}`);
            if (el) el.classList.add('fet');
          });
        }
      } catch (e) { console.log("Estat no trobat encara."); }
    }
    carregarEstat();
  </script>
</body>
</html>
